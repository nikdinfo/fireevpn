<div id="exitPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center;">
  <div class="glass-card fade-in" style="max-width: 400px; width: 90%; text-align: center; position: relative; border-color: rgba(249, 115, 22, 0.5);">

<style>
  @media (max-width: 768px) {
    .sticky-mobile-cta { display: block; }
    body { padding-bottom: 80px; /* Чтобы контент не перекрывался кнопкой */ }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Exit intent popup logic
    let popupShown = false;
    const popup = document.getElementById('exitPopup');
    const closeBtn = document.getElementById('closePopup');

    document.addEventListener('mouseout', (e) => {
      if (e.clientY < 50 && !popupShown) {
        popup.style.display = 'flex';
        popupShown = true;
      }
    });

    closeBtn.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    // Закрытие по клику вне попапа
    popup.addEventListener('click', (e) => {
      if (e.target === popup) {
        popup.style.display = 'none';
      }
    });
  });
</script>
